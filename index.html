<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FitMirror - 虚拟试穿</title>
<style>
:root {
  --bg: #f8f7f5;
  --surface: #ffffff;
  --border: #eae6e0;
  --text: #2d2a26;
  --text2: #9e9890;
  --accent: #5b7fff;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); -webkit-tap-highlight-color:transparent; user-select:none; }
body { display:flex; flex-direction:column; }

/* 顶栏 */
.topbar { height:48px; min-height:48px; display:flex; align-items:center; gap:8px; padding:0 20px; background:var(--surface); border-bottom:1px solid var(--border); }
.topbar h1 { font-size:17px; font-weight:700; letter-spacing:-0.3px; }
.topbar span { font-size:11px; color:var(--text2); margin-left:2px; }
.topbar .gh { margin-left:auto; font-size:12px; color:var(--text2); }

/* 主体 */
.main { flex:1; display:flex; min-height:0; }

/* 左侧衣柜 25% */
.wardrobe { width:25%; min-width:280px; max-width:380px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.w-head { padding:16px 16px 8px; }
.cats { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.cat { padding:13px 8px; border:1.5px solid var(--border); background:var(--surface); border-radius:12px; font-size:13px; cursor:pointer; transition:all 0.18s; text-align:center; color:var(--text2); display:flex; align-items:center; justify-content:center; gap:6px; }
.cat em { font-style:normal; font-size:16px; }
.cat .txt { font-size:12px; }
.cat.active { background:#f0f0ff; border-color:var(--accent); color:var(--accent); font-weight:600; }
.cat:hover:not(.active) { border-color:#d0ccc4; }

.w-body { flex:1; overflow-y:auto; padding:12px 16px; display:grid; grid-template-columns:1fr 1fr; gap:10px; align-content:start; }
.w-body::-webkit-scrollbar { width:4px; }
.w-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

.cloth { aspect-ratio:1; border-radius:10px; border:2px solid transparent; overflow:hidden; cursor:pointer; background:#f3f1ed; transition:all 0.15s; position:relative; }
.cloth:hover { transform:scale(1.04); }
.cloth.on { border-color:var(--accent); box-shadow:0 0 0 3px rgba(91,127,255,0.18); }
.cloth img { width:100%; height:100%; object-fit:cover; }
.cloth .x { position:absolute; top:5px; right:5px; width:20px; height:20px; border:none; background:rgba(0,0,0,0.4); color:#fff; border-radius:50%; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.15s; }
.cloth:hover .x { opacity:1; }
.empty { grid-column:1/-1; padding:24px; text-align:center; color:var(--text2); font-size:12px; border:2px dashed var(--border); border-radius:10px; }

.w-foot { padding:12px 16px; border-top:1px solid var(--border); display:flex; gap:8px; }
.w-foot button { flex:1; padding:12px; border:none; background:var(--accent); color:#fff; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; transition:opacity 0.15s; }
.w-foot button:hover { opacity:0.9; }
.w-foot .hint { font-size:11px; color:var(--text2); text-align:center; margin-top:6px; }

/* 右侧人物 75% */
.view { flex:1; position:relative; background:radial-gradient(ellipse at center,#f3f0eb 0%,#e5e1d9 100%); cursor:ew-resize; display:flex; align-items:center; justify-content:center; }
.view canvas { display:block; }
.tip { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); font-size:12px; color:var(--text2); pointer-events:none; animation:tipFade 4s forwards; display:flex; align-items:center; gap:6px; }
.tip span { font-size:18px; }
@keyframes tipFade { 0%,60%{opacity:0.7} 100%{opacity:0} }

/* 裁剪弹窗 */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(4px); }
.overlay.hide { display:none; }
.modal { background:var(--surface); border-radius:18px; padding:24px; width:92%; max-width:480px; max-height:90vh; display:flex; flex-direction:column; gap:14px; box-shadow:0 12px 60px rgba(0,0,0,0.18); }
.m-head { display:flex; justify-content:space-between; align-items:center; font-size:16px; font-weight:600; }
.m-head button { width:28px; height:28px; border:none; background:#f0eeeb; border-radius:50%; cursor:pointer; font-size:15px; }
.crop-wrap { width:100%; aspect-ratio:1; background:#e8e5df; border-radius:12px; overflow:hidden; touch-action:none; }
.crop-wrap canvas { width:100%; height:100%; }
.crop-btns { display:flex; gap:8px; flex-wrap:wrap; }
.crop-btns button { padding:9px 16px; border:1px solid var(--border); background:var(--surface); border-radius:20px; font-size:13px; cursor:pointer; transition:background 0.15s; }
.crop-btns button:hover { background:#f5f3f0; }
.m-foot { display:flex; gap:10px; justify-content:flex-end; }
.btn2 { padding:11px 22px; border:1px solid var(--border); background:var(--surface); border-radius:22px; font-size:14px; cursor:pointer; }
.btn1 { padding:11px 26px; border:none; background:var(--accent); color:#fff; border-radius:22px; font-size:14px; font-weight:600; cursor:pointer; }
.tip2 { font-size:11px; color:var(--text2); text-align:center; }

@media (max-width:768px) {
  .main { flex-direction:column; }
  .wardrobe { width:100%; min-width:unset; max-width:unset; max-height:36vh; border-right:none; border-bottom:1px solid var(--border); }
  .w-body { grid-template-columns:repeat(auto-fill,minmax(76px,1fr)); gap:8px; }
  .view { flex:1; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>🪞 FitMirror</h1>
  <span>虚拟试穿</span>
  <span class="gh">← 左右滑动查看</span>
</div>

<div class="main">

  <!-- 左侧衣柜 25% -->
  <div class="wardrobe">
    <div class="w-head">
      <div class="cats" id="cats"></div>
    </div>
    <div class="w-body" id="wBody"></div>
    <div class="w-foot">
      <button id="addBtn">+ 上传衣服</button>
    </div>
  </div>

  <!-- 右侧 3D 人物 -->
  <div class="view" id="view">
    <div class="tip"><span>👆</span> 左右滑动旋转人物</div>
  </div>

</div>

<!-- 裁剪弹窗 -->
<div class="overlay hide" id="cropOverlay">
  <div class="modal">
    <div class="m-head"><span>裁剪 — <span id="cropLabel"></span></span><button id="cropClose">✕</button></div>
    <div class="crop-wrap"><canvas id="cropCvs"></canvas></div>
    <div class="crop-btns">
      <button id="rotL">↺ 左转</button>
      <button id="rotR">↻ 右转</button>
      <button id="rst">↩ 重置</button>
    </div>
    <div class="m-foot">
      <button class="btn2" id="cropCancel">取消</button>
      <button class="btn1" id="cropOk">确认 ✓</button>
    </div>
    <p class="tip2">拖拽移动 · 四角缩放 · 对准衣服主体</p>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ============================================================
// DOM
// ============================================================
const viewEl = document.getElementById('view');
const catsEl = document.getElementById('cats');
const wBody = document.getElementById('wBody');
const addBtn = document.getElementById('addBtn');
const cropOverlay = document.getElementById('cropOverlay');
const cropCvs = document.getElementById('cropCvs');
const cropCtx = cropCvs.getContext('2d');
const cropLabel = document.getElementById('cropLabel');
const CAT_NAMES = { hat:'帽子', top:'上衣', bottom:'裤子', shoes:'鞋子' };
const CAT_ICONS = { hat:'🎩', top:'👕', bottom:'👖', shoes:'👟' };

// ============================================================
// 状态
// ============================================================
let curCat = 'hat';
const wardrobe = { hat:[], top:[], bottom:[], shoes:[] };
const selected = { hat:null, top:null, bottom:null, shoes:null };
let targetRotY = 0;  // 人物目标旋转角度

// ============================================================
// Three.js 场景
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
viewEl.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf3f0eb);
scene.fog = new THREE.Fog(0xf3f0eb, 2.5, 9);

const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 20);
camera.position.set(0, 0.95, 3.8);
camera.lookAt(0, 0.95, 0);

// 灯光
scene.add(new THREE.AmbientLight(0xfff6f0, 2.2));
const sun = new THREE.DirectionalLight(0xffffff, 4.5);
sun.position.set(2, 3.5, 3);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.bias = -0.0001;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xffeedd, 2.2);
fill.position.set(-1.5, 0.3, -1);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 2.8);
rim.position.set(0, 2, -2.5);
scene.add(rim);

// 地面
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(2, 32),
  new THREE.MeshStandardMaterial({ color:0xe5e1d9, roughness:0.9 })
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -1.06;
ground.receiveShadow = true;
scene.add(ground);

// ============================================================
// 人物建模（可爱风格，成人比例）
// ============================================================
const root = new THREE.Group();
const sway = new THREE.Group();
const body = new THREE.Group();
scene.add(root);
root.add(sway);
sway.add(body);

// 材质
const sMat = () => new THREE.MeshStandardMaterial({ color:0xfdd9c8, roughness:0.5 }); // 暖白皮
const sDk = () => new THREE.MeshStandardMaterial({ color:0xe8bca0, roughness:0.5 });
const hairMat = new THREE.MeshStandardMaterial({ color:0x3d2b1f, roughness:0.6 });
const eyeW = () => new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.05 });
const pupilM = new THREE.MeshStandardMaterial({ color:0x1a1614, roughness:0.05 });
const blushM = new THREE.MeshStandardMaterial({ color:0xf5bcb0, roughness:0.3, transparent:true, opacity:0.3 });
const mouthM = new THREE.MeshStandardMaterial({ color:0xe8958a, roughness:0.25 });
const defTop = new THREE.MeshStandardMaterial({ color:0xf5f0eb, roughness:0.45 });
const defBot = new THREE.MeshStandardMaterial({ color:0x7b8fab, roughness:0.45 });
const defShoe = new THREE.MeshStandardMaterial({ color:0x3d3d3d, roughness:0.35 });

// --- 躯干 ---
const torsoGeo = new THREE.CapsuleGeometry(0.19, 0.42, 8, 12);
const torso = new THREE.Mesh(torsoGeo, sMat());
torso.position.y = 1.18;
torso.castShadow = true;
body.add(torso);

// 上衣层
const topGeo = new THREE.CylinderGeometry(0.21, 0.25, 0.65, 20, 1, true, 0, Math.PI*1.0);
const topMesh = new THREE.Mesh(topGeo, defTop);
topMesh.position.y = 1.18;
topMesh.name = 'top';
body.add(topMesh);

// --- 腿 ---
[-0.09, 0.09].forEach(sx => {
  const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.13, 0.55, 12), sMat());
  leg.position.set(sx, 0.56, 0);
  leg.castShadow = true;
  body.add(leg);
  // 裤层
  const p = new THREE.Mesh(new THREE.CylinderGeometry(0.135, 0.145, 0.60, 12), defBot);
  p.position.set(sx, 0.56, 0);
  p.name = 'bot-'+sx;
  body.add(p);
});

// --- 小腿 ---
[-0.09, 0.09].forEach(sx => {
  const c = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.10, 0.35, 10), sMat());
  c.position.set(sx, 0.15, 0);
  c.castShadow = true;
  body.add(c);
});

// --- 鞋 ---
[-0.09, 0.09].forEach(sx => {
  const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.07, 0.21), defShoe);
  shoe.position.set(sx, -0.06, 0.04);
  shoe.name = 'shoe-'+sx;
  body.add(shoe);
});

// --- 脖子 ---
body.add(new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.07, 0.09, 10), sMat())).position.y = 1.50;

// --- 头 ---
const headG = new THREE.Group();
headG.position.y = 1.65;
body.add(headG);

const headGeo = new THREE.SphereGeometry(0.195, 32, 32);
headGeo.scale(1, 1.06, 0.94);
headG.add(new THREE.Mesh(headGeo, sMat())).castShadow = true;

// 头发
const hairGeo = new THREE.SphereGeometry(0.205, 32, 32, 0, Math.PI*2, 0, Math.PI*0.5);
hairGeo.scale(1, 1.06, 0.94);
const hair = new THREE.Mesh(hairGeo, hairMat);
hair.position.y = 0.03;
headG.add(hair);

// 刘海
const bangsGeo = new THREE.SphereGeometry(0.21, 24, 24, 0, Math.PI*2, 0, Math.PI*0.25);
bangsGeo.scale(1, 1.06, 0.94);
const bangs = new THREE.Mesh(bangsGeo, hairMat);
bangs.position.set(0, 0.02, -0.08);
bangs.rotation.x = -0.25;
headG.add(bangs);

// 眼睛
const eyeG = new THREE.Group();
headG.add(eyeG);
[-0.072, 0.072].forEach(ex => {
  // 眼白
  const wGeo = new THREE.SphereGeometry(0.048, 16, 16);
  wGeo.scale(1.05, 0.85, 0.35);
  eyeG.add(new THREE.Mesh(wGeo, eyeW())).position.set(ex, 0.045, -0.168);
  // 瞳孔
  const pGeo = new THREE.SphereGeometry(0.027, 12, 12);
  eyeG.add(new THREE.Mesh(pGeo, pupilM)).position.set(ex, 0.045, -0.205);
  // 高光
  const hlGeo = new THREE.SphereGeometry(0.012, 8, 8);
  eyeG.add(new THREE.Mesh(hlGeo, eyeW())).position.set(ex+0.015, 0.058, -0.195);
});

// 眉毛
[-0.072, 0.072].forEach(ex => {
  const bGeo = new THREE.BoxGeometry(0.065, 0.013, 0.013);
  const b = new THREE.Mesh(bGeo, hairMat.clone());
  b.position.set(ex, 0.09, -0.165);
  eyeG.add(b);
});

// 鼻子
headG.add(new THREE.Mesh(new THREE.SphereGeometry(0.018, 10, 10), sDk())).position.set(0, -0.005, -0.192);

// 嘴
const mouthGeo = new THREE.TorusGeometry(0.028, 0.007, 8, 10, Math.PI);
const mouth = new THREE.Mesh(mouthGeo, mouthM);
mouth.position.set(0, -0.048, -0.19);
mouth.rotation.z = Math.PI;
headG.add(mouth);

// 腮红
[-0.095, 0.095].forEach(ex => {
  headG.add(new THREE.Mesh(new THREE.CircleGeometry(0.028, 12), blushM)).position.set(ex, -0.01, -0.18);
});

// --- 帽子位 ---
const hatPos = new THREE.Group();
hatPos.position.y = 0.24;
headG.add(hatPos);
const hatMesh = new THREE.Mesh(
  new THREE.CylinderGeometry(0.16, 0.18, 0.13, 16),
  new THREE.MeshStandardMaterial({ visible:false })
);
hatMesh.position.y = 0.02;
hatPos.add(hatMesh);

// --- 手臂 ---
[-1, 1].forEach(side => {
  const sx = side * 0.29;
  body.add(new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.06, 0.32, 10), sMat())).position.set(sx, 1.32, 0);
  body.add(new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.053, 0.30, 10), sMat())).position.set(sx, 0.97, 0);
  const hGeo = new THREE.SphereGeometry(0.05, 10, 10);
  hGeo.scale(1, 0.68, 0.45);
  body.add(new THREE.Mesh(hGeo, sMat())).position.set(sx, 0.65, 0.02);
});

// ============================================================
// 衣服贴图
// ============================================================
function applyCloth(cat, dataUrl) {
  const tex = new THREE.TextureLoader().load(dataUrl);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  const mat = new THREE.MeshStandardMaterial({ map:tex, roughness:0.5, side:THREE.DoubleSide });
  if (cat==='hat') { hatMesh.material=mat; hatMesh.material.visible=true; }
  else if (cat==='top') { topMesh.material=mat; }
  else if (cat==='bottom') { body.children.forEach(c=>{ if(c.name&&c.name.startsWith('bot-')) c.material=mat; }); }
  else if (cat==='shoes') { body.children.forEach(c=>{ if(c.name&&c.name.startsWith('shoe-')) c.material=mat; }); }
}
function removeCloth(cat) {
  if (cat==='hat') { hatMesh.material=new THREE.MeshStandardMaterial({visible:false}); }
  else if (cat==='top') { topMesh.material=defTop; }
  else if (cat==='bottom') { body.children.forEach(c=>{ if(c.name&&c.name.startsWith('bot-')) c.material=defBot; }); }
  else if (cat==='shoes') { body.children.forEach(c=>{ if(c.name&&c.name.startsWith('shoe-')) c.material=defShoe; }); }
}

// ============================================================
// 动画循环
// ============================================================
const clock = new THREE.Clock();
let breathP=0, swayP=0, blinkT=0, blinkOn=false, blinkD=0, htT=0, htOn=false, htP=0;

function loop() {
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.1);

  // 呼吸
  breathP += dt * 2.4;
  const b = 1 + Math.sin(breathP)*0.014;
  body.scale.set(b, 1+Math.sin(breathP)*0.012, b);

  // 微晃
  swayP += dt * 1.15;
  sway.rotation.z = Math.sin(swayP)*0.025;
  sway.rotation.x = Math.cos(swayP*1.4)*0.016;

  // 平滑旋转
  root.rotation.y += (targetRotY - root.rotation.y) * 0.12;

  // 眨眼
  if (!blinkOn) { blinkT+=dt; if(blinkT>2.5+Math.random()*5){blinkOn=true;blinkT=0;blinkD=0;} }
  else { blinkD+=dt; const t=blinkD/0.13; eyeG.scale.y=t<0.5?Math.max(0.03,1-t*2):Math.min(1,(t-0.5)*2); if(t>=1){eyeG.scale.y=1;blinkOn=false;} }

  // 摸头
  if(!htOn){ htT+=dt; if(htT>12+Math.random()*12){htOn=true;htT=0;htP=0;} }
  else { htP+=dt; const t=htP/1.6; if(t<0.3)headG.rotation.z=THREE.MathUtils.lerp(0,0.12,t/0.3); else if(t<0.65)headG.rotation.z=0.12; else headG.rotation.z=THREE.MathUtils.lerp(0.12,0,(t-0.65)/0.35); if(t>=1){headG.rotation.z=0;htOn=false;} }

  renderer.render(scene, camera);
}

// ============================================================
// 左右滑动旋转
// ============================================================
let dragOn=false, dragX0=0, rot0=0;
const viewEl_dom = viewEl;

viewEl_dom.addEventListener('pointerdown', e => {
  dragOn = true;
  dragX0 = e.clientX;
  rot0 = targetRotY;
  viewEl_dom.setPointerCapture(e.pointerId);
});
viewEl_dom.addEventListener('pointermove', e => {
  if (!dragOn) return;
  const dx = e.clientX - dragX0;
  targetRotY = rot0 + dx * 0.008;
});
viewEl_dom.addEventListener('pointerup', () => { dragOn = false; });
viewEl_dom.addEventListener('pointerleave', () => { dragOn = false; });

// 触摸也支持
viewEl_dom.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragOn = true;
    dragX0 = e.touches[0].clientX;
    rot0 = targetRotY;
  }
}, { passive: true });
viewEl_dom.addEventListener('touchmove', e => {
  if (!dragOn || e.touches.length !== 1) return;
  targetRotY = rot0 + (e.touches[0].clientX - dragX0) * 0.008;
}, { passive: true });
viewEl_dom.addEventListener('touchend', () => { dragOn = false; });

// ============================================================
// 响应式
// ============================================================
function resize() {
  const r = viewEl_dom.getBoundingClientRect();
  renderer.setSize(r.width, r.height);
  camera.aspect = r.width / Math.max(r.height, 1);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();
loop();

// ============================================================
// 衣柜 UI
// ============================================================
function buildCats() {
  catsEl.innerHTML = Object.entries(CAT_ICONS).map(([k,icon]) =>
    `<button class="cat${k===curCat?' active':''}" data-cat="${k}"><em>${icon}</em><span class="txt">${CAT_NAMES[k]}</span></button>`
  ).join('');
}
buildCats();

function renderWardrobe() {
  const items = wardrobe[curCat];
  if (items.length===0) {
    wBody.innerHTML = `<div class="empty">还没有${CAT_NAMES[curCat]}<br>上传一张照片吧</div>`;
  } else {
    wBody.innerHTML = items.map((it,i) => `
      <div class="cloth${selected[curCat]===i?' on':''}">
        <img src="${it.dataUrl}" alt="">
        <button class="x" data-i="${i}">✕</button>
      </div>
    `).join('');
    // 事件
    wBody.querySelectorAll('.cloth').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.classList.contains('x')) return;
        const i = parseInt(el.querySelector('.x').dataset.i);
        if (selected[curCat]===i) { selected[curCat]=null; removeCloth(curCat); }
        else { selected[curCat]=i; applyCloth(curCat, items[i].dataUrl); }
        renderWardrobe();
      });
    });
    wBody.querySelectorAll('.x').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const i = parseInt(btn.dataset.i);
        if (selected[curCat]===i) { selected[curCat]=null; removeCloth(curCat); }
        else if (selected[curCat]>i) selected[curCat]--;
        items.splice(i,1);
        renderWardrobe();
      });
    });
  }
}
renderWardrobe();

// 分类切换
catsEl.addEventListener('click', e => {
  const btn = e.target.closest('.cat');
  if (!btn) return;
  curCat = btn.dataset.cat;
  catsEl.querySelectorAll('.cat').forEach(b => b.classList.toggle('active', b.dataset.cat===curCat));
  renderWardrobe();
});

// 上传
addBtn.addEventListener('click', () => {
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange = () => { if (inp.files[0]) openCropper(inp.files[0], curCat); };
  inp.click();
});

// ============================================================
// 裁剪器
// ============================================================
let cImg=null, cCat=null, cRot=0, cScl=1;
let cRect={x:0,y:0,w:200,h:200};
let cDrag=false, cKind=null, cDs={x:0,y:0}, cRs={x:0,y:0,w:0,h:0};

function openCropper(file, cat) {
  cCat=cat; cRot=0;
  cropLabel.textContent = CAT_NAMES[cat];
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    cImg=img;
    const cw=img.width*0.7, ch=img.height*0.7;
    cRect={x:(img.width-cw)/2, y:(img.height-ch)/2, w:cw, h:ch};
    fitCrop(); renderCrop();
    cropOverlay.classList.remove('hide');
  };
  img.src=url;
}
function fitCrop() {
  if(!cImg) return;
  cScl = Math.min(440/cImg.width, 440/cImg.height);
  cropCvs.width = cImg.width*cScl;
  cropCvs.height = cImg.height*cScl;
}
function renderCrop() {
  if(!cImg) return;
  const ctx=cropCtx, w=cropCvs.width, h=cropCvs.height;
  ctx.clearRect(0,0,w,h);
  ctx.save(); ctx.translate(w/2,h/2);
  ctx.rotate(cRot*Math.PI/180);
  ctx.drawImage(cImg, -cImg.width*cScl/2, -cImg.height*cScl/2, cImg.width*cScl, cImg.height*cScl);
  ctx.restore();
  ctx.fillStyle='rgba(0,0,0,0.42)'; ctx.fillRect(0,0,w,h);
  const cx=cRect.x*cScl, cy=cRect.y*cScl, cw=cRect.w*cScl, ch=cRect.h*cScl;
  ctx.clearRect(cx,cy,cw,ch);
  ctx.save(); ctx.beginPath(); ctx.rect(cx,cy,cw,ch); ctx.clip();
  ctx.translate(w/2,h/2); ctx.rotate(cRot*Math.PI/180);
  ctx.drawImage(cImg, -cImg.width*cScl/2, -cImg.height*cScl/2, cImg.width*cScl, cImg.height*cScl);
  ctx.restore();
  // 框
  ctx.strokeStyle='#5b7fff'; ctx.lineWidth=2.5; ctx.strokeRect(cx,cy,cw,ch);
  // 网格
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=0.5;
  ctx.beginPath();
  ctx.moveTo(cx+cw/3,cy); ctx.lineTo(cx+cw/3,cy+ch);
  ctx.moveTo(cx+cw*2/3,cy); ctx.lineTo(cx+cw*2/3,cy+ch);
  ctx.moveTo(cx,cy+ch/3); ctx.lineTo(cx+cw,cy+ch/3);
  ctx.moveTo(cx,cy+ch*2/3); ctx.lineTo(cx+cw,cy+ch*2/3);
  ctx.stroke();
  // 四角
  const hs=16;
  [[cx,cy],[cx+cw,cy],[cx,cy+ch],[cx+cw,cy+ch]].forEach(([hx,hy])=>{
    ctx.fillStyle='#5b7fff'; ctx.fillRect(hx-hs/2,hy-hs/2,hs,hs);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(hx-hs/2,hy-hs/2,hs,hs);
  });
}
function cpPos(e) {
  const r=cropCvs.getBoundingClientRect();
  const x=e.touches?e.touches[0].clientX:e.clientX;
  const y=e.touches?e.touches[0].clientY:e.clientY;
  return {x:(x-r.left)*(cropCvs.width/r.width), y:(y-r.top)*(cropCvs.height/r.height)};
}
cropCvs.addEventListener('mousedown',e=>startCrop(cpPos(e)));
cropCvs.addEventListener('touchstart',e=>{e.preventDefault();startCrop(cpPos(e));},{passive:false});
window.addEventListener('mousemove',e=>moveCrop(cpPos(e)));
window.addEventListener('touchmove',e=>{if(cDrag){e.preventDefault();moveCrop(cpPos(e));}},{passive:false});
window.addEventListener('mouseup',endCrop);
window.addEventListener('touchend',endCrop);

function startCrop(pos) {
  const cx=cRect.x*cScl, cy=cRect.y*cScl, cw=cRect.w*cScl, ch=cRect.h*cScl, hs=22;
  const corners={nw:[cx,cy],ne:[cx+cw,cy],sw:[cx,cy+ch],se:[cx+cw,cy+ch]};
  for(const [k,[hx,hy]] of Object.entries(corners)){if(Math.abs(pos.x-hx)<hs&&Math.abs(pos.y-hy)<hs){cKind=k;break;}}
  if(!cKind){if(pos.x>=cx&&pos.x<=cx+cw&&pos.y>=cy&&pos.y<=cy+ch)cKind='move';else return;}
  cDrag=true; cDs={x:pos.x,y:pos.y}; cRs={...cRect};
}
function moveCrop(pos) {
  if(!cDrag) return;
  const dx=(pos.x-cDs.x)/cScl, dy=(pos.y-cDs.y)/cScl, rs=cRs;
  let {x,y,w,h}=rs;
  if(cKind==='move'){x=rs.x+dx;y=rs.y+dy;}
  else if(cKind==='se'){w=rs.w+dx;h=rs.h+dy;}
  else if(cKind==='sw'){x=rs.x+dx;w=rs.w-dx;h=rs.h+dy;}
  else if(cKind==='ne'){y=rs.y+dy;w=rs.w+dx;h=rs.h-dy;}
  else if(cKind==='nw'){x=rs.x+dx;y=rs.y+dy;w=rs.w-dx;h=rs.h-dy;}
  if(w<35)w=35; if(h<35)h=35;
  if(x<0)x=0; if(y<0)y=0;
  if(x+w>cImg.width)w=cImg.width-x;
  if(y+h>cImg.height)h=cImg.height-y;
  cRect={x,y,w,h}; renderCrop();
}
function endCrop(){cDrag=false;cKind=null;}

document.getElementById('rotL').onclick=()=>{cRot=(cRot-15)%360;renderCrop();};
document.getElementById('rotR').onclick=()=>{cRot=(cRot+15)%360;renderCrop();};
document.getElementById('rst').onclick=()=>{
  if(!cImg)return;
  const cw=cImg.width*0.7,ch=cImg.height*0.7;
  cRect={x:(cImg.width-cw)/2,y:(cImg.height-ch)/2,w:cw,h:ch};cRot=0;renderCrop();
};

document.getElementById('cropOk').onclick=()=>{
  if(!cImg)return;
  const off=document.createElement('canvas');
  off.width=cRect.w; off.height=cRect.h;
  const ctx=off.getContext('2d');
  ctx.save(); ctx.translate(off.width/2,off.height/2);
  if(cRot!==0)ctx.rotate(cRot*Math.PI/180);
  ctx.drawImage(cImg,cRect.x,cRect.y,cRect.w,cRect.h,-off.width/2,-off.height/2,off.width,off.height);
  ctx.restore();
  const dataUrl=off.toDataURL('image/png',0.85);
  closeCropper();
  wardrobe[cCat].push({dataUrl});
  curCat=cCat;
  catsEl.querySelectorAll('.cat').forEach(b=>b.classList.toggle('active',b.dataset.cat===curCat));
  selected[cCat]=wardrobe[cCat].length-1;
  applyCloth(cCat,dataUrl);
  renderWardrobe();
};
function closeCropper(){cropOverlay.classList.add('hide');cImg=null;}
document.getElementById('cropClose').onclick=closeCropper;
document.getElementById('cropCancel').onclick=closeCropper;
cropOverlay.addEventListener('click',e=>{if(e.target===cropOverlay)closeCropper();});

// 键盘
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  const m={'1':'hat','2':'top','3':'bottom','4':'shoes'};
  if(m[e.key]){curCat=m[e.key];catsEl.querySelectorAll('.cat').forEach(b=>b.classList.toggle('active',b.dataset.cat===curCat));renderWardrobe();}
});

console.log('🪞 FitMirror v2 ready');
</script>
