<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FitMirror - 虚拟试穿</title>
<style>
/* ============================================ */
:root {
  --bg: #f7f6f4;
  --surface: #ffffff;
  --border: #e5e2dd;
  --text: #2d2a26;
  --text2: #8c8780;
  --accent: #ff6b6b;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); -webkit-tap-highlight-color:transparent; user-select:none; }
/* 顶栏 */
.topbar { height:50px; display:flex; align-items:center; gap:8px; padding:0 16px; background:var(--surface); border-bottom:1px solid var(--border); z-index:10; position:relative; }
.topbar h1 { font-size:17px; font-weight:700; }
.topbar .sub { font-size:11px; color:var(--text2); }
/* 主体 */
.main { display:flex; height:calc(100% - 50px); }
/* 左侧衣柜 */
.wardrobe { width:260px; min-width:260px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; transition:transform 0.3s; }
.wardrobe-head { padding:12px 12px 8px; }
.cat-tabs { display:flex; gap:4px; flex-wrap:wrap; }
.cat-tab { flex:1; min-width:50px; padding:9px 4px; border:1px solid var(--border); background:var(--surface); border-radius:20px; font-size:11px; cursor:pointer; transition:all 0.15s; text-align:center; color:var(--text2); }
.cat-tab.active { background:var(--text); color:#fff; border-color:var(--text); }
.wardrobe-body { flex:1; overflow-y:auto; padding:0 12px 12px; display:flex; flex-wrap:wrap; gap:8px; align-content:flex-start; }
.wardrobe-body::-webkit-scrollbar { width:4px; }
.wardrobe-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
.cloth-card { width:calc(50% - 4px); aspect-ratio:1; border-radius:10px; border:2px solid transparent; overflow:hidden; cursor:pointer; position:relative; background:#f5f3f0; transition:all 0.15s; }
.cloth-card:hover { transform:scale(1.03); }
.cloth-card.sel { border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,107,107,0.2); }
.cloth-card img { width:100%; height:100%; object-fit:contain; }
.cloth-card .del { position:absolute; top:4px; right:4px; width:18px; height:18px; border:none; background:rgba(0,0,0,0.45); color:#fff; border-radius:50%; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.15s; }
.cloth-card:hover .del { opacity:1; }
.empty-hint { width:100%; padding:20px 8px; text-align:center; color:var(--text2); font-size:12px; border:2px dashed var(--border); border-radius:10px; }
.add-row { padding:0 12px 12px; display:flex; gap:8px; }
.add-row select { flex:1; padding:10px 8px; border:1px solid var(--border); border-radius:20px; font-size:13px; background:var(--surface); cursor:pointer; }
.add-row button { padding:10px 16px; border:none; background:var(--accent); color:#fff; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
.add-row button:hover { opacity:0.9; }
/* 右侧人物 */
.viewport { flex:1; position:relative; cursor:grab; background:radial-gradient(ellipse at center,#f0ede8 0%,#e0dcd5 100%); }
.viewport:active { cursor:grabbing; }
.viewport canvas { display:block; }
.hint { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); font-size:11px; color:var(--text2); pointer-events:none; animation:fade 3s forwards; }
@keyframes fade { 0%,60%{opacity:0.7} 100%{opacity:0} }
/* 裁剪弹窗 */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(4px); }
.overlay.hidden { display:none; }
.modal { background:var(--surface); border-radius:var(--radius); padding:20px; width:92%; max-width:460px; max-height:92vh; display:flex; flex-direction:column; gap:12px; box-shadow:0 8px 40px rgba(0,0,0,0.15); }
.modal h3 { font-size:15px; display:flex; justify-content:space-between; align-items:center; }
.modal h3 button { width:26px; height:26px; border:none; background:#f0efed; border-radius:50%; cursor:pointer; font-size:14px; }
.crop-box { width:100%; aspect-ratio:1; background:#e8e5e0; border-radius:10px; overflow:hidden; touch-action:none; position:relative; }
.crop-box canvas { width:100%; height:100%; }
.crop-ctrls { display:flex; gap:6px; flex-wrap:wrap; }
.crop-ctrls button { padding:8px 14px; border:1px solid var(--border); background:var(--surface); border-radius:20px; font-size:12px; cursor:pointer; }
.modal-btns { display:flex; gap:8px; justify-content:flex-end; }
.btn-c { padding:10px 20px; border:1px solid var(--border); background:var(--surface); border-radius:20px; font-size:13px; cursor:pointer; }
.btn-s { padding:10px 24px; border:none; background:var(--accent); color:#fff; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; }
.crop-tip { font-size:11px; color:var(--text2); text-align:center; }
/* 手机适配 */
@media (max-width:768px) {
  .main { flex-direction:column; }
  .wardrobe { width:100%; min-width:unset; max-height:38vh; border-right:none; border-bottom:1px solid var(--border); }
  .cloth-card { width:72px; min-width:72px; height:72px; }
  .wardrobe-body { flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden; flex:none; padding-bottom:8px; }
  .empty-hint { min-width:120px; }
  .viewport { flex:1; min-height:45vh; }
}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <h1>🪞 FitMirror</h1>
  <span class="sub">虚拟试穿</span>
</div>

<!-- 主体 -->
<div class="main">

  <!-- 左侧衣柜 -->
  <div class="wardrobe" id="wardrobe">

    <div class="wardrobe-head">
      <div class="cat-tabs" id="catTabs">
        <button class="cat-tab active" data-cat="hat">🎩 帽子</button>
        <button class="cat-tab" data-cat="top">👕 上衣</button>
        <button class="cat-tab" data-cat="bottom">👖 裤子</button>
        <button class="cat-tab" data-cat="shoes">👟 鞋子</button>
      </div>
    </div>

    <div class="wardrobe-body" id="wardrobeBody"></div>

    <div class="add-row">
      <button id="addBtn" style="flex:1">+ 添加衣服</button>
    </div>

  </div>

  <!-- 右侧3D人物 -->
  <div class="viewport" id="vport">
    <div class="hint">↻ 拖拽旋转 · 滚轮缩放 · 右键平移</div>
  </div>

</div>

<!-- 裁剪弹窗 -->
<div class="overlay hidden" id="cropOverlay">
  <div class="modal">
    <h3>裁剪 — <span id="cropCatLabel"></span><button id="cropClose">✕</button></h3>
    <div class="crop-box" id="cropBox">
      <canvas id="cropCvs"></canvas>
    </div>
    <div class="crop-ctrls">
      <button id="rotL">↺ 左转</button>
      <button id="rotR">↻ 右转</button>
      <button id="rst">↩ 重置</button>
    </div>
    <div class="modal-btns">
      <button class="btn-c" id="cropCancel">取消</button>
      <button class="btn-s" id="cropOk">确认 ✓</button>
    </div>
    <p class="crop-tip">拖拽移动裁剪框 · 四角缩放 · 对准衣服主体</p>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// DOM
// ============================================================
const vport = document.getElementById('vport');
const wardrobeBody = document.getElementById('wardrobeBody');
const catTabs = document.getElementById('catTabs');
const addBtn = document.getElementById('addBtn');
const cropOverlay = document.getElementById('cropOverlay');
const cropCvs = document.getElementById('cropCvs');
const cropCtx = cropCvs.getContext('2d');
const cropCatLabel = document.getElementById('cropCatLabel');

// ============================================================
// 状态
// ============================================================
let curCat = 'hat';
const wardrobe = { hat:[], top:[], bottom:[], shoes:[] };
const selected = { hat:null, top:null, bottom:null, shoes:null };

// 裁剪状态
let cropImg = null;
let cropCat = null;
let cropRot = 0;
let cropScl = 1;
let cropRect = { x:0, y:0, w:200, h:200 };
let dragOn = false;
let dragKind = null; // 'move'|'nw'|'ne'|'sw'|'se'
let dragStart = { x:0, y:0 };
let rectStart = { x:0, y:0, w:0, h:0 };

// ============================================================
// Three.js 初始化
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
vport.appendChild(renderer.domElement);

const scene = new THREE.Scene();
// 柔和的暖灰背景
scene.background = new THREE.Color(0xede9e3);
scene.fog = new THREE.Fog(0xede9e3, 2.5, 8);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 20);
camera.position.set(0, 0.95, 3.5);
camera.lookAt(0, 0.95, 0);

// 灯光
scene.add(new THREE.AmbientLight(0xfff5ee, 2.0));

const key = new THREE.DirectionalLight(0xffffff, 4);
key.position.set(2, 3, 3);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
key.shadow.bias = -0.0001;
scene.add(key);

const fill = new THREE.DirectionalLight(0xffeedd, 2);
fill.position.set(-1.5, 0.5, -1);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xffffff, 2.5);
rim.position.set(0, 1.8, -2.5);
scene.add(rim);

// 地面阴影接收面
const floorGeo = new THREE.CircleGeometry(1.8, 32);
const floor = new THREE.Mesh(floorGeo, new THREE.MeshStandardMaterial({ color:0xe5e0d8, roughness:0.9 }));
floor.rotation.x = -Math.PI / 2;
floor.position.y = -1.08;
floor.receiveShadow = true;
scene.add(floor);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.95, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.2;
controls.maxDistance = 5;
controls.maxPolarAngle = Math.PI * 0.68;
controls.minPolarAngle = 0.3;
controls.update();

// ============================================================
// 材质
// ============================================================
const mSkin = () => new THREE.MeshStandardMaterial({ color:0xf5d0c5, roughness:0.55 });
const mSkinD = () => new THREE.MeshStandardMaterial({ color:0xe8bca8, roughness:0.55 });
const mHair = new THREE.MeshStandardMaterial({ color:0x4a3728, roughness:0.65 });
const mWhite = () => new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.1 });
const mPupil = new THREE.MeshStandardMaterial({ color:0x1a1816, roughness:0.1 });
const mMouth = new THREE.MeshStandardMaterial({ color:0xd4837a, roughness:0.3 });
const mBlush = new THREE.MeshStandardMaterial({ color:0xf0b0a8, roughness:0.3, transparent:true, opacity:0.35 });
const mTop = new THREE.MeshStandardMaterial({ color:0xf0ebe3, roughness:0.5 });
const mBottom = new THREE.MeshStandardMaterial({ color:0x6880a8, roughness:0.5 });
const mShoes = new THREE.MeshStandardMaterial({ color:0x3a3a3a, roughness:0.4 });

// ============================================================
// 构建人物
// ============================================================
const root = new THREE.Group();
const swayG = new THREE.Group(); swayG.name='sway';
const breathG = new THREE.Group(); breathG.name='breath';
scene.add(root);
root.add(swayG);
swayG.add(breathG);

// ---- 躯干 ----
const torsoGeo = new THREE.CylinderGeometry(0.20, 0.24, 0.55, 16);
const torso = new THREE.Mesh(torsoGeo, mSkin());
torso.position.y = 1.18;
torso.castShadow = true;
breathG.add(torso);

// 上衣穿戴层
const topGeo = new THREE.CylinderGeometry(0.215, 0.255, 0.58, 16, 1, true, 0, Math.PI * 1.3);
const topMesh = new THREE.Mesh(topGeo, mTop);
topMesh.name = 'cloth-top';
topMesh.position.y = 1.18;
breathG.add(topMesh);

// ---- 腿 ----
const legGeo = new THREE.CylinderGeometry(0.13, 0.135, 0.55, 12);
[-0.09, 0.09].forEach(sx => {
  const leg = new THREE.Mesh(legGeo, mSkin());
  leg.position.set(sx, 0.55, 0);
  leg.castShadow = true;
  breathG.add(leg);
});

// 裤子穿戴层
[-0.09, 0.09].forEach(sx => {
  const pGeo = new THREE.CylinderGeometry(0.145, 0.15, 0.58, 12);
  const p = new THREE.Mesh(pGeo, mBottom);
  p.position.set(sx, 0.55, 0);
  p.name = 'cloth-bottom-' + sx;
  breathG.add(p);
});

// ---- 小腿 ----
[-0.09, 0.09].forEach(sx => {
  const calfGeo = new THREE.CylinderGeometry(0.09, 0.11, 0.35, 12);
  const calf = new THREE.Mesh(calfGeo, mSkin());
  calf.position.set(sx, 0.15, 0);
  calf.castShadow = true;
  breathG.add(calf);
});

// ---- 鞋子----
[-0.09, 0.09].forEach(sx => {
  const sGeo = new THREE.BoxGeometry(0.11, 0.07, 0.20);
  const shoe = new THREE.Mesh(sGeo, mShoes);
  shoe.position.set(sx, -0.06, 0.04);
  shoe.name = 'cloth-shoes-' + sx;
  breathG.add(shoe);
});

// ---- 脖子 ----
const neckGeo = new THREE.CylinderGeometry(0.065, 0.075, 0.09, 12);
const neck = new THREE.Mesh(neckGeo, mSkin());
neck.position.y = 1.50;
neck.castShadow = true;
breathG.add(neck);

// ---- 头 ----
const headG = new THREE.Group();
headG.position.y = 1.63;
breathG.add(headG);

const headGeo = new THREE.SphereGeometry(0.20, 28, 28);
headGeo.scale(1, 1.08, 0.95);
const headMesh = new THREE.Mesh(headGeo, mSkin());
headMesh.castShadow = true;
headG.add(headMesh);

// 头发
const hairGeo = new THREE.SphereGeometry(0.21, 28, 28, 0, Math.PI*2, 0, Math.PI*0.52);
hairGeo.scale(1, 1.08, 0.95);
const hairMesh = new THREE.Mesh(hairGeo, mHair);
hairMesh.position.y = 0.02;
headG.add(hairMesh);

// 眼睛组
const eyeG = new THREE.Group();
headG.add(eyeG);
[-0.07, 0.07].forEach(ex => {
  const wGeo = new THREE.SphereGeometry(0.044, 12, 12);
  wGeo.scale(1, 0.82, 0.38);
  const w = new THREE.Mesh(wGeo, mWhite());
  w.position.set(ex, 0.05, -0.17);
  eyeG.add(w);
  const pGeo = new THREE.SphereGeometry(0.024, 8, 8);
  const p = new THREE.Mesh(pGeo, mPupil);
  p.position.set(ex, 0.05, -0.205);
  eyeG.add(p);
});

// 眉毛
[-0.07, 0.07].forEach(ex => {
  const bGeo = new THREE.BoxGeometry(0.06, 0.012, 0.014);
  const b = new THREE.Mesh(bGeo, mHair.clone());
  b.position.set(ex, 0.09, -0.17);
  eyeG.add(b);
});

// 鼻子
const noseGeo = new THREE.SphereGeometry(0.017, 8, 8);
const nose = new THREE.Mesh(noseGeo, mSkinD());
nose.position.set(0, 0.0, -0.195);
headG.add(nose);

// 嘴
const mouthGeo = new THREE.TorusGeometry(0.028, 0.007, 6, 8, Math.PI);
const mouth = new THREE.Mesh(mouthGeo, mMouth);
mouth.position.set(0, -0.04, -0.192);
mouth.rotation.z = Math.PI;
headG.add(mouth);

// 腮红
[-0.09, 0.09].forEach(ex => {
  const bg = new THREE.CircleGeometry(0.025, 12);
  const bm = new THREE.Mesh(bg, mBlush);
  bm.position.set(ex, 0.0, -0.18);
  headG.add(bm);
});

// ---- 帽子穿戴层----
const hatG = new THREE.Group();
hatG.position.y = 0.23;
headG.add(hatG);
const hatGeo = new THREE.CylinderGeometry(0.17, 0.19, 0.12, 16);
const hatMesh = new THREE.Mesh(hatGeo, new THREE.MeshStandardMaterial({ visible:false }));
hatMesh.position.y = 0.02;
hatG.add(hatMesh);

// ---- 手臂 ----
[-1, 1].forEach(side => {
  const sx = side * 0.28;
  // 上臂
  const uaGeo = new THREE.CylinderGeometry(0.058, 0.062, 0.33, 10);
  const ua = new THREE.Mesh(uaGeo, mSkin());
  ua.position.set(sx, 1.32, 0);
  ua.castShadow = true;
  breathG.add(ua);
  // 前臂
  const laGeo = new THREE.CylinderGeometry(0.052, 0.056, 0.30, 10);
  const la = new THREE.Mesh(laGeo, mSkin());
  la.position.set(sx, 0.97, 0);
  la.castShadow = true;
  breathG.add(la);
  // 手
  const hGeo = new THREE.SphereGeometry(0.052, 10, 10);
  hGeo.scale(1, 0.7, 0.48);
  const h = new THREE.Mesh(hGeo, mSkin());
  h.position.set(sx, 0.65, 0.02);
  h.castShadow = true;
  breathG.add(h);
});

// ============================================================
// 衣服应用
// ============================================================
function applyCloth(cat, dataUrl) {
  const tex = new THREE.TextureLoader().load(dataUrl);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = THREE.ClampToEdgeWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;

  const mat = new THREE.MeshStandardMaterial({ map:tex, roughness:0.5, side:THREE.DoubleSide });
  if (cat === 'hat') {
    hatMesh.material = mat; hatMesh.material.visible = true;
  } else if (cat === 'top') {
    topMesh.material = mat;
  } else if (cat === 'bottom') {
    breathG.children.forEach(c => { if (c.name && c.name.startsWith('cloth-bottom-')) c.material = mat; });
  } else if (cat === 'shoes') {
    breathG.children.forEach(c => { if (c.name && c.name.startsWith('cloth-shoes-')) c.material = mat; });
  }
}

function removeCloth(cat) {
  if (cat === 'hat') {
    hatMesh.material = new THREE.MeshStandardMaterial({ visible:false });
  } else if (cat === 'top') {
    topMesh.material = mTop;
  } else if (cat === 'bottom') {
    breathG.children.forEach(c => { if (c.name && c.name.startsWith('cloth-bottom-')) c.material = mBottom; });
  } else if (cat === 'shoes') {
    breathG.children.forEach(c => { if (c.name && c.name.startsWith('cloth-shoes-')) c.material = mShoes; });
  }
}

// ============================================================
// 待机动画
// ============================================================
const clock = new THREE.Clock();
let breathP = 0, swayP = 0;
let blinkTimer = 0, blinkOn = false, blinkDur = 0;
let htTimer = 0, htOn = false, htPhase = 0;

function animLoop() {
  requestAnimationFrame(animLoop);
  const dt = Math.min(clock.getDelta(), 0.1);

  // 呼吸
  breathP += dt * 2.5;
  const bs = 1 + Math.sin(breathP) * 0.014;
  breathG.scale.set(bs, 1 + Math.sin(breathP) * 0.011, bs);

  // 微晃
  swayP += dt * 1.2;
  swayG.rotation.z = Math.sin(swayP) * 0.028;
  swayG.rotation.x = Math.cos(swayP * 1.3) * 0.018;

  // 眨眼
  if (!blinkOn) {
    blinkTimer += dt;
    if (blinkTimer > 2.5 + Math.random() * 4) { blinkOn = true; blinkTimer = 0; blinkDur = 0; }
  } else {
    blinkDur += dt;
    const t = blinkDur / 0.14;
    eyeG.scale.y = t < 0.5 ? Math.max(0.04, 1 - t*2) : Math.min(1, (t-0.5)*2);
    if (t >= 1) { eyeG.scale.y = 1; blinkOn = false; }
  }

  // 摸头发
  if (!htOn) {
    htTimer += dt;
    if (htTimer > 10 + Math.random() * 14) { htOn = true; htTimer = 0; htPhase = 0; }
  } else {
    htPhase += dt;
    const t = htPhase / 1.8;
    if (t < 0.25) headG.rotation.z = THREE.MathUtils.lerp(0, 0.14, t / 0.25);
    else if (t < 0.6) headG.rotation.z = 0.14;
    else headG.rotation.z = THREE.MathUtils.lerp(0.14, 0, (t - 0.6) / 0.4);
    if (t >= 1) { headG.rotation.z = 0; htOn = false; }
  }

  controls.update();
  renderer.render(scene, camera);
}

// ============================================================
// 窗口尺寸
// ============================================================
function resize() {
  const r = vport.getBoundingClientRect();
  renderer.setSize(r.width, r.height);
  camera.aspect = r.width / Math.max(r.height, 1);
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// 启动渲染
animLoop();

// ============================================================
// 衣柜渲染
// ============================================================
const catLabel = { hat:'帽子', top:'上衣', bottom:'裤子', shoes:'鞋子' };

function renderWardrobe() {
  const items = wardrobe[curCat];
  wardrobeBody.innerHTML = '';
  if (items.length === 0) {
    wardrobeBody.innerHTML = `<div class="empty-hint">还没有${catLabel[curCat]}<br>点击下方按钮上传</div>`;
    return;
  }
  items.forEach((it, i) => {
    const d = document.createElement('div');
    d.className = 'cloth-card' + (selected[curCat] === i ? ' sel' : '');
    d.innerHTML = `<img src="${it.dataUrl}" alt=""><button class="del" data-i="${i}">✕</button>`;
    d.addEventListener('click', e => {
      if (e.target.classList.contains('del')) return;
      if (selected[curCat] === i) { selected[curCat] = null; removeCloth(curCat); }
      else { selected[curCat] = i; applyCloth(curCat, it.dataUrl); }
      renderWardrobe();
    });
    d.querySelector('.del').addEventListener('click', e => {
      e.stopPropagation();
      if (selected[curCat] === i) { selected[curCat] = null; removeCloth(curCat); }
      else if (selected[curCat] > i) selected[curCat]--;
      items.splice(i, 1);
      renderWardrobe();
    });
    wardrobeBody.appendChild(d);
  });
}

// ============================================================
// 分类切换
// ============================================================
catTabs.addEventListener('click', e => {
  const b = e.target.closest('.cat-tab');
  if (!b) return;
  curCat = b.dataset.cat;
  catTabs.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  b.classList.add('active');
  renderWardrobe();
});

// ============================================================
// 上传流程
// ============================================================
addBtn.addEventListener('click', () => {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.onchange = () => {
    const f = inp.files[0];
    if (!f) return;
    openCropper(f, curCat);
  };
  inp.click();
});

// ============================================================
// 裁剪器
// ============================================================
function openCropper(file, cat) {
  cropCat = cat;
  cropRot = 0;
  cropCatLabel.textContent = catLabel[cat];
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    cropImg = img;
    const cw = img.width * 0.7, ch = img.height * 0.7;
    cropRect = { x:(img.width-cw)/2, y:(img.height-ch)/2, w:cw, h:ch };
    fitCropCanvas();
    renderCrop();
    cropOverlay.classList.remove('hidden');
  };
  img.src = url;
}

function fitCropCanvas() {
  if (!cropImg) return;
  const max = 420;
  cropScl = Math.min(max / cropImg.width, max / cropImg.height);
  cropCvs.width = cropImg.width * cropScl;
  cropCvs.height = cropImg.height * cropScl;
}

function renderCrop() {
  if (!cropImg) return;
  const ctx = cropCtx, w = cropCvs.width, h = cropCvs.height;
  ctx.clearRect(0, 0, w, h);
  // 旋转
  ctx.save();
  ctx.translate(w/2, h/2);
  const rad = (cropRot * Math.PI) / 180;
  ctx.rotate(rad);
  const s = cropScl;
  ctx.drawImage(cropImg, -cropImg.width*s/2, -cropImg.height*s/2, cropImg.width*s, cropImg.height*s);
  ctx.restore();
  // 遮罩
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, w, h);
  const cx = cropRect.x * cropScl, cy = cropRect.y * cropScl;
  const cw = cropRect.w * cropScl, ch = cropRect.h * cropScl;
  ctx.clearRect(cx, cy, cw, ch);
  // 裁剪区内图像
  ctx.save();
  ctx.beginPath(); ctx.rect(cx, cy, cw, ch); ctx.clip();
  ctx.translate(w/2, h/2);
  ctx.rotate(rad);
  ctx.drawImage(cropImg, -cropImg.width*s/2, -cropImg.height*s/2, cropImg.width*s, cropImg.height*s);
  ctx.restore();
  // 框 + 网格
  ctx.strokeStyle = '#ff6b6b'; ctx.lineWidth = 2;
  ctx.strokeRect(cx, cy, cw, ch);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 0.5;
  [[1/3,0],[2/3,0],[1/3,ch],[2/3,ch],[0,1/3],[cw,1/3],[0,2/3],[cw,2/3]].forEach(([px,py]) => {
    if (px===1/3||px===2/3) { ctx.beginPath(); ctx.moveTo(cx+cw*px/cw,cx===1/3?cy:cy); ctx.lineTo(cx+cw*(px===1/3?1/3:2/3),cy+ch); ctx.stroke(); }
  });
  ctx.beginPath();
  ctx.moveTo(cx + cw/3, cy); ctx.lineTo(cx + cw/3, cy + ch);
  ctx.moveTo(cx + cw*2/3, cy); ctx.lineTo(cx + cw*2/3, cy + ch);
  ctx.moveTo(cx, cy + ch/3); ctx.lineTo(cx + cw, cy + ch/3);
  ctx.moveTo(cx, cy + ch*2/3); ctx.lineTo(cx + cw, cy + ch*2/3);
  ctx.stroke();
  // 四角手柄
  const hs = 14;
  [[cx,cy],[cx+cw,cy],[cx,cy+ch],[cx+cw,cy+ch]].forEach(([hx,hy]) => {
    ctx.fillStyle = '#ff6b6b';
    ctx.fillRect(hx-hs/2, hy-hs/2, hs, hs);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.strokeRect(hx-hs/2, hy-hs/2, hs, hs);
  });
}

// 裁剪交互
function getCropPos(e) {
  const r = cropCvs.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x:(cx-r.left)*(cropCvs.width/r.width), y:(cy-r.top)*(cropCvs.height/r.height) };
}

cropCvs.addEventListener('mousedown', e => startCropDrag(getCropPos(e)));
cropCvs.addEventListener('touchstart', e => { e.preventDefault(); startCropDrag(getCropPos(e)); }, {passive:false});
window.addEventListener('mousemove', e => doCropDrag(getCropPos(e)));
window.addEventListener('touchmove', e => { if(dragOn){ e.preventDefault(); doCropDrag(getCropPos(e)); } }, {passive:false});
window.addEventListener('mouseup', endCropDrag);
window.addEventListener('touchend', endCropDrag);

function startCropDrag(pos) {
  const cx = cropRect.x * cropScl, cy = cropRect.y * cropScl;
  const cw = cropRect.w * cropScl, ch = cropRect.h * cropScl;
  const hs = 20;
  const corners = { nw:[cx,cy], ne:[cx+cw,cy], sw:[cx,cy+ch], se:[cx+cw,cy+ch] };
  for (const [k,[hx,hy]] of Object.entries(corners)) {
    if (Math.abs(pos.x-hx)<hs && Math.abs(pos.y-hy)<hs) { dragKind=k; break; }
  }
  if (!dragKind) {
    if (pos.x>=cx && pos.x<=cx+cw && pos.y>=cy && pos.y<=cy+ch) dragKind='move';
    else return;
  }
  dragOn = true;
  dragStart = { x:pos.x, y:pos.y };
  rectStart = { ...cropRect };
}

function doCropDrag(pos) {
  if (!dragOn) return;
  const dx = (pos.x - dragStart.x) / cropScl;
  const dy = (pos.y - dragStart.y) / cropScl;
  const rs = rectStart;
  let { x, y, w, h } = rs;
  if (dragKind === 'move') { x=rs.x+dx; y=rs.y+dy; }
  else if (dragKind === 'se') { w=rs.w+dx; h=rs.h+dy; }
  else if (dragKind === 'sw') { x=rs.x+dx; w=rs.w-dx; h=rs.h+dy; }
  else if (dragKind === 'ne') { y=rs.y+dy; w=rs.w+dx; h=rs.h-dy; }
  else if (dragKind === 'nw') { x=rs.x+dx; y=rs.y+dy; w=rs.w-dx; h=rs.h-dy; }
  if (w<40) w=40; if (h<40) h=40;
  if (x<0) x=0; if (y<0) y=0;
  if (x+w>cropImg.width) w=cropImg.width-x;
  if (y+h>cropImg.height) h=cropImg.height-y;
  cropRect = { x,y,w,h };
  renderCrop();
}

function endCropDrag() { dragOn=false; dragKind=null; }

document.getElementById('rotL').addEventListener('click', ()=>{ cropRot=(cropRot-15)%360; renderCrop(); });
document.getElementById('rotR').addEventListener('click', ()=>{ cropRot=(cropRot+15)%360; renderCrop(); });
document.getElementById('rst').addEventListener('click', ()=>{
  if (!cropImg) return;
  const cw=cropImg.width*0.7, ch=cropImg.height*0.7;
  cropRect={ x:(cropImg.width-cw)/2, y:(cropImg.height-ch)/2, w:cw, h:ch };
  cropRot=0; renderCrop();
});

// 确认裁剪
document.getElementById('cropOk').addEventListener('click', ()=>{
  if (!cropImg) return;
  const off = document.createElement('canvas');
  off.width = cropRect.w; off.height = cropRect.h;
  const ctx = off.getContext('2d');
  ctx.save();
  ctx.translate(off.width/2, off.height/2);
  if (cropRot !== 0) ctx.rotate((cropRot*Math.PI)/180);
  ctx.drawImage(cropImg, cropRect.x, cropRect.y, cropRect.w, cropRect.h, -off.width/2, -off.height/2, off.width, off.height);
  ctx.restore();
  const dataUrl = off.toDataURL('image/png', 0.85);
  closeCropper();
  // 添加到衣柜并应用
  wardrobe[cropCat].push({ dataUrl });
  curCat = cropCat;
  catTabs.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === curCat));
  const idx = wardrobe[cropCat].length - 1;
  selected[cropCat] = idx;
  applyCloth(cropCat, dataUrl);
  renderWardrobe();
});

function closeCropper() { cropOverlay.classList.add('hidden'); cropImg=null; }
document.getElementById('cropClose').addEventListener('click', closeCropper);
document.getElementById('cropCancel').addEventListener('click', closeCropper);
cropOverlay.addEventListener('click', e => { if (e.target === cropOverlay) closeCropper(); });

// ============================================================
// 键盘切换
// ============================================================
window.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  const map = {'1':'hat','2':'top','3':'bottom','4':'shoes'};
  if (map[e.key]) { curCat=map[e.key]; catTabs.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat===curCat)); renderWardrobe(); }
});

// ============================================================
// 初始渲染
// ============================================================
renderWardrobe();
console.log('🪞 FitMirror ready — 3D virtual try-on');
</script>
